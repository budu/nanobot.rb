plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'

# Relaxing some rules for initial implementation
Metrics/MethodLength:
  Max: 30

Metrics/ClassLength:
  Max: 200

Metrics/ModuleLength:
  Max: 200

Metrics/BlockLength:
  Max: 50
  Exclude:
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 30

Metrics/ParameterLists:
  CountKeywordArgs: false

Naming/PredicateMethod:
  AllowedMethods:
    - delete

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 15

Layout/LineLength:
  Max: 120

# Allow descriptive names
Naming/MethodParameterName:
  MinNameLength: 2

# Documentation not required for now
Style/Documentation:
  Enabled: false

# RSpec Configuration
RSpec/MultipleExpectations:
  Max: 10

RSpec/ExampleLength:
  Max: 35

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/PredicateMatcher:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/VerifiedDoubleReference:
  Enabled: false

# Integration specs use @provider/@workspace instance variables set by
# before(:all) in the record/replay DSL — no way around it with let.
RSpec/InstanceVariable:
  Exclude:
    - 'spec/integration/**/*'

# Integration specs use string descriptions for use-case categories
RSpec/DescribeClass:
  Exclude:
    - 'spec/integration/**/*'

# The replay loop defines fixture_label in an each block — intentional
RSpec/LeakyLocalVariable:
  Exclude:
    - 'spec/integration/**/*'
